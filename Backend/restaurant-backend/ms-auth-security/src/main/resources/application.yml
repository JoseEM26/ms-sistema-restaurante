server:
  port: 8081

spring:
  application:
    name: ms-auth-security

  datasource:
    url: jdbc:postgresql://localhost:5432/db_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway maneja el schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: clave-secreta-restaurant-2024-muy-larga-para-seguridad
  expiration: 86400000   # 24 horas en ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  servers:
    - url: http://localhost:8080
      description: API Gateway (usa este para probar)

management:
  endpoints:
    web:
      exposure:
        include: health,info
