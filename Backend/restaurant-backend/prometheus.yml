global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ms-core-maestros'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-maestros:8082']

  - job_name: 'ms-ventas'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-ventas:8083']

  - job_name: 'ms-auth-security'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-auth:8081']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
