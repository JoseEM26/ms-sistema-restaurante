apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: restaurant/config-server:1.0.0
          ports:
            - containerPort: 8888
          envFrom:
            - configMapRef:
                name: restaurant-config
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: restaurant
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
