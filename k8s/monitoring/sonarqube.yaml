apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      containers:
        - name: sonarqube
          image: sonarqube:10.5-community
          ports:
            - containerPort: 9000
          env:
            - name: SONAR_JDBC_URL
              value: jdbc:postgresql://postgres-service:5432/db_sonar
            - name: SONAR_JDBC_USERNAME
              value: postgres
            - name: SONAR_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: restaurant-secrets
                  key: SONAR_JDBC_PASSWORD
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: sonarqube-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-service
  namespace: restaurant
spec:
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
